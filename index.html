<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Playlive Melbourne — Chop Calculator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; }

.header-bar { background: #C0392B; height: 6px; }
.header-main { background: #1A1A1A; padding: 20px 20px 16px; text-align: center; border-bottom: 3px solid #C0392B; }
.header-main h1 { font-size: 24px; font-weight: 700; color: #fff; letter-spacing: 2px; }
.header-main p { font-size: 12px; color: #C0392B; font-style: italic; margin-top: 5px; }

.container { max-width: 540px; margin: 0 auto; padding: 18px 14px 40px; }

.section { background: #1C1C1C; border-radius: 10px; margin-bottom: 16px; overflow: hidden; border: 1px solid #2a2a2a; }
.section-header { background: #151515; border-left: 4px solid #C0392B; padding: 11px 14px; }
.section-header h2 { font-size: 11px; font-weight: 700; color: #C0392B; letter-spacing: 0.8px; text-transform: uppercase; }
.section-body { padding: 14px; }

.field { margin-bottom: 12px; }
.field:last-child { margin-bottom: 0; }
label { display: block; font-size: 11px; color: #777; margin-bottom: 5px; font-weight: 700; letter-spacing: 0.4px; text-transform: uppercase; }
input[type="text"], input[type="number"] {
  width: 100%; background: #111; border: 1px solid #2e2e2e; border-radius: 7px;
  padding: 11px 13px; font-size: 16px; color: #fff; outline: none;
  -webkit-appearance: none; transition: border-color 0.2s;
}
input:focus { border-color: #C0392B; }
input::placeholder { color: #444; }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.payout-row { display: grid; grid-template-columns: 90px 1fr; gap: 8px; margin-bottom: 8px; align-items: center; }
.payout-row:last-child { margin-bottom: 0; }
.place-badge { font-size: 12px; font-weight: 700; color: #C0392B; text-align: center; background: #1f1f1f; border-radius: 6px; padding: 10px 6px; border: 1px solid #2a2a2a; }

.pool-total { display: flex; justify-content: space-between; align-items: center; background: #C0392B; border-radius: 8px; padding: 12px 16px; margin-top: 14px; }
.pool-total span { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.75); }
.pool-total strong { font-size: 20px; font-weight: 700; color: #fff; }

.col-labels { display: grid; grid-template-columns: 2fr 1.2fr 1.2fr; gap: 8px; margin-bottom: 6px; padding: 0 2px; }
.col-lbl { font-size: 10px; color: #555; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; text-align: center; }
.col-lbl:first-child { text-align: left; }

.player-row { display: grid; grid-template-columns: 2fr 1.2fr 1.2fr; gap: 8px; margin-bottom: 8px; }
.player-row:last-child { margin-bottom: 0; }

.adj-hint { font-size: 10px; color: #555; margin-top: 10px; line-height: 1.5; text-align: center; }
.adj-hint span { color: #C0392B; }

.btn-row { display: flex; gap: 8px; margin-top: 14px; }
.btn-add { flex: 1; padding: 11px; background: #C0392B; color: #fff; border: none; border-radius: 7px; font-size: 13px; font-weight: 700; cursor: pointer; }
.btn-rem { flex: 1; padding: 11px; background: #222; color: #888; border: 1px solid #2e2e2e; border-radius: 7px; font-size: 13px; font-weight: 700; cursor: pointer; }

.results-section { display: none; }
.results-section.visible { display: block; }

.result-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 12px 0; border-bottom: 1px solid #222; }
.result-item:last-child { border-bottom: none; }
.result-name { font-size: 15px; font-weight: 700; color: #fff; }
.result-detail { font-size: 11px; color: #666; margin-top: 3px; }
.result-adj { font-size: 11px; color: #e67e22; margin-top: 2px; font-weight: 600; }
.result-amount { font-size: 22px; font-weight: 700; color: #2ecc71; }
.result-base { font-size: 11px; color: #555; text-align: right; margin-top: 2px; }

.grand-total { background: #C0392B; border-radius: 8px; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; margin-top: 14px; }
.grand-total span { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.8); }
.grand-total strong { font-size: 22px; font-weight: 700; color: #fff; }

.submit-btn { width: 100%; padding: 16px; background: #C0392B; color: #fff; font-size: 16px; font-weight: 700; border: none; border-radius: 10px; cursor: pointer; margin-top: 8px; letter-spacing: 0.5px; }
.submit-btn:disabled { background: #333; color: #555; cursor: not-allowed; }

.status-msg { text-align: center; padding: 13px; border-radius: 8px; font-size: 13px; font-weight: 600; margin-top: 10px; display: none; }
.status-msg.sending { background: #222; color: #888; display: block; }
.status-msg.success { background: #0d2e0d; color: #2ecc71; display: block; }
.status-msg.error   { background: #2e0d0d; color: #e74c3c; display: block; }
</style>
</head>
<body>

<div class="header-bar"></div>
<div class="header-main">
  <h1>PLAYLIVE MELBOURNE</h1>
  <p>Tournament Chop Calculator — ICM Method</p>
</div>

<div class="container">

  <!-- Tournament Info -->
  <div class="section">
    <div class="section-header"><h2>Tournament Info</h2></div>
    <div class="section-body">
      <div class="grid2">
        <div class="field">
          <label>Tournament Name</label>
          <input type="text" id="tournamentName" placeholder="e.g. Friday Night MTT">
        </div>
        <div class="field">
          <label>Table</label>
          <input type="text" id="tableNum" placeholder="Table 3">
        </div>
      </div>
      <div class="grid2">
        <div class="field">
          <label>Date</label>
          <input type="text" id="dateField">
        </div>
        <div class="field">
          <label>Supervisor</label>
          <input type="text" id="supervisor" placeholder="Name">
        </div>
      </div>
    </div>
  </div>

  <!-- Payouts -->
  <div class="section">
    <div class="section-header"><h2>Step 1 — Prize Per Place</h2></div>
    <div class="section-body">
      <div id="payoutRows"></div>
      <div class="pool-total">
        <span>TOTAL PRIZE POOL</span>
        <strong id="poolDisplay">$0</strong>
      </div>
    </div>
  </div>

  <!-- Players -->
  <div class="section">
    <div class="section-header"><h2>Step 2 — Player Chips &amp; Adjustments</h2></div>
    <div class="section-body">
      <div class="col-labels">
        <div class="col-lbl">Name</div>
        <div class="col-lbl">Chips</div>
        <div class="col-lbl">Adjust ($)</div>
      </div>
      <div id="playerRows"></div>
      <div class="adj-hint">
        Adjustment: <span>+100</span> = bonus &nbsp;|&nbsp; <span>-50</span> = deduction
      </div>
      <div class="btn-row">
        <button class="btn-add" onclick="addPlayer()">+ Add Player</button>
        <button class="btn-rem" onclick="removePlayer()">&#8722; Remove</button>
      </div>
    </div>
  </div>

  <!-- Results -->
  <div class="section results-section" id="resultsSection">
    <div class="section-header"><h2>ICM Chop Results</h2></div>
    <div class="section-body">
      <div id="resultList"></div>
      <div class="grand-total">
        <span>TOTAL PAID OUT</span>
        <strong id="grandTotal">$0</strong>
      </div>
    </div>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="submitToSheets()">
    Send to Google Sheets &amp; Print Slip
  </button>
  <div class="status-msg" id="statusMsg"></div>

</div>

<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxNliHJcQyUfHF0uz2c1vhV0v75-kq3GQXqN82hDQDBhMKgR2VSpCLST5MgVsyUzfp8/exec';
var PLACE_NAMES = ['1st Place','2nd Place','3rd Place','4th Place','5th Place','6th Place'];
var playerCount = 0;
var lastResult  = null;

function buildPayouts() {
  var container = document.getElementById('payoutRows');
  container.innerHTML = '';
  var i, div;
  for (i = 0; i < 6; i++) {
    div = document.createElement('div');
    div.className = 'payout-row';
    div.innerHTML =
      '<div class="place-badge">' + PLACE_NAMES[i] + '</div>' +
      '<input type="number" class="payout-amt" id="payout-' + i + '" placeholder="0" min="0" oninput="recalc()">';
    container.appendChild(div);
  }
}

function addPlayer() {
  if (playerCount >= 9) { return; }
  var i = playerCount;
  var div = document.createElement('div');
  div.className = 'player-row';
  div.id = 'prow-' + i;
  div.innerHTML =
    '<input type="text"   id="pname-'  + i + '" placeholder="Player ' + (i + 1) + '" oninput="recalc()">' +
    '<input type="number" id="pchips-' + i + '" placeholder="0" min="0" oninput="recalc()">' +
    '<input type="number" id="padj-'   + i + '" placeholder="0" oninput="recalc()">';
  document.getElementById('playerRows').appendChild(div);
  playerCount++;
  recalc();
}

function removePlayer() {
  if (playerCount <= 1) { return; }
  playerCount--;
  var el = document.getElementById('prow-' + playerCount);
  if (el) { el.parentNode.removeChild(el); }
  recalc();
}

function calcICM(stacks, payouts) {
  var n = stacks.length;
  var p = payouts.length;
  var equity = [];
  var i, j, depth, mask, newMask;
  var remTotal, prob;

  for (i = 0; i < n; i++) { equity.push(0); }
  if (n === 0 || p === 0) { return equity; }

  var total = 0;
  for (i = 0; i < n; i++) { total += stacks[i]; }
  if (total === 0) { return equity; }

  var size = 1 << n;
  var probs = [];
  var next  = [];
  for (i = 0; i < size; i++) { probs.push(0); next.push(0); }
  probs[0] = 1.0;

  var places = Math.min(p, n);

  for (depth = 0; depth < places; depth++) {
    for (i = 0; i < size; i++) { next[i] = 0; }
    var prize = payouts[depth];

    for (mask = 0; mask < size; mask++) {
      if (probs[mask] === 0) { continue; }
      remTotal = 0;
      for (j = 0; j < n; j++) {
        if (!(mask >> j & 1)) { remTotal += stacks[j]; }
      }
      if (remTotal === 0) { continue; }
      for (j = 0; j < n; j++) {
        if (mask >> j & 1) { continue; }
        prob = (probs[mask] * stacks[j]) / remTotal;
        equity[j] += prob * prize;
        newMask = mask | (1 << j);
        next[newMask] += prob;
      }
    }

    for (i = 0; i < size; i++) { probs[i] = next[i]; }
  }

  return equity;
}

function recalc() {
  var i, v, el;
  var payouts   = [];
  var totalPool = 0;

  for (i = 0; i < 6; i++) {
    el = document.getElementById('payout-' + i);
    if (!el) { continue; }
    v = parseFloat(el.value) || 0;
    if (v > 0) { payouts.push(v); totalPool += v; }
  }

  document.getElementById('poolDisplay').textContent = '$' + Math.round(totalPool).toLocaleString();

  var players = [];
  for (i = 0; i < playerCount; i++) {
    var nameEl  = document.getElementById('pname-'  + i);
    var chipEl  = document.getElementById('pchips-' + i);
    var adjEl   = document.getElementById('padj-'   + i);
    if (!nameEl || !chipEl) { continue; }
    var chips = parseFloat(chipEl.value) || 0;
    if (chips <= 0) { continue; }
    players.push({
      name:  nameEl.value || ('Player ' + (i + 1)),
      chips: chips,
      adj:   parseFloat(adjEl ? adjEl.value : 0) || 0
    });
  }

  if (players.length === 0 || totalPool === 0) {
    document.getElementById('resultsSection').classList.remove('visible');
    lastResult = null;
    return;
  }

  var stacks = [];
  for (i = 0; i < players.length; i++) { stacks.push(players[i].chips); }

  var firstPrize = payouts[0] || 0;
  var icm = calcICM(stacks, payouts);

  var totalChips = 0;
  for (i = 0; i < stacks.length; i++) { totalChips += stacks[i]; }

  var html       = '';
  var grandTotal = 0;
  var resultPlayers = [];
  var p, base, final, chipPct, adjText;

  for (i = 0; i < players.length; i++) {
    p        = players[i];
    base     = icm[i] > firstPrize ? firstPrize : icm[i];
    final    = base + p.adj;
    grandTotal += final;
    chipPct  = totalChips > 0 ? ((p.chips / totalChips) * 100).toFixed(1) : '0.0';
    adjText  = '';
    if (p.adj > 0) { adjText = '+$' + Math.round(p.adj).toLocaleString() + ' adjustment'; }
    else if (p.adj < 0) { adjText = '-$' + Math.round(Math.abs(p.adj)).toLocaleString() + ' adjustment'; }

    html +=
      '<div class="result-item">' +
        '<div>' +
          '<div class="result-name">' + p.name + '</div>' +
          '<div class="result-detail">' + p.chips.toLocaleString() + ' chips (' + chipPct + '%)</div>' +
          (adjText ? '<div class="result-adj">' + adjText + '</div>' : '') +
        '</div>' +
        '<div style="text-align:right">' +
          '<div class="result-amount">$' + Math.round(final).toLocaleString() + '</div>' +
          '<div class="result-base">Base: $' + Math.round(base).toLocaleString() + '</div>' +
        '</div>' +
      '</div>';

    resultPlayers.push({
      name:       p.name,
      chips:      p.chips,
      chipPct:    chipPct,
      baseChop:   Math.round(base),
      adjustment: p.adj,
      finalChop:  Math.round(final)
    });
  }

  document.getElementById('resultList').innerHTML = html;
  document.getElementById('grandTotal').textContent = '$' + Math.round(grandTotal).toLocaleString();
  document.getElementById('resultsSection').classList.add('visible');

  lastResult = {
    tournamentName: document.getElementById('tournamentName').value,
    table:          document.getElementById('tableNum').value,
    date:           document.getElementById('dateField').value,
    supervisor:     document.getElementById('supervisor').value,
    totalPool:      totalPool,
    payouts:        payouts,
    players:        resultPlayers
  };
}

function submitToSheets() {
  if (!lastResult || lastResult.players.length === 0) {
    showStatus('error', 'Please fill in player stacks and payouts first.');
    return;
  }
  var btn = document.getElementById('submitBtn');
  btn.disabled = true;
  showStatus('sending', 'Sending to Google Sheets...');

  fetch(SCRIPT_URL, {
    method:  'POST',
    mode:    'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify(lastResult)
  }).then(function() {
    showStatus('success', 'Done! Head to reception to print the Chop Slip from Google Sheets.');
    btn.disabled = false;
  }).catch(function() {
    showStatus('error', 'Could not reach Google Sheets. Check your connection and try again.');
    btn.disabled = false;
  });
}

function showStatus(type, msg) {
  var el = document.getElementById('statusMsg');
  el.className = 'status-msg ' + type;
  el.textContent = msg;
}

// Init
buildPayouts();
addPlayer();
addPlayer();
addPlayer();

var today = new Date();
var dd    = String(today.getDate()).padStart(2, '0');
var mm    = String(today.getMonth() + 1).padStart(2, '0');
var yyyy  = today.getFullYear();
document.getElementById('dateField').value = dd + '/' + mm + '/' + yyyy;
</script>
</body>
</html>
